<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Envío de Contenido MariemilySilva.com</title>

    <!-- Carga de Tailwind CSS desde CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuración personalizada de Tailwind para usar la paleta de colores del proyecto -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary-red": "#D90429",
              "dark-gray": "#1A1A1A",
              "light-gray": "#F5F5F5",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-light-gray flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-lg">
      <!-- Contenedor para la notificación -->
      <div
        id="notification"
        class="hidden text-white p-4 rounded-md mb-4 text-center transition-opacity duration-300"
      ></div>

      <!-- Tarjeta del Formulario -->
      <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg w-full">
        <!-- Logo -->
        <div class="flex justify-center mb-6">
          <img src="logo.svg" alt="Logo" class="h-16 w-auto" />
        </div>

        <!-- Título y Subtítulo -->
        <div class="text-center mb-8">
          <h1 class="text-2xl sm:text-3xl font-bold text-dark-gray">
            Portal de Contenido<br>MariemilySilva
          </h1>
          <p class="text-gray-500 mt-2">
            Envía el contenido y la imagen principal para tu nueva entrada de
            blog.
          </p>
        </div>

        <!-- Formulario -->
        <form id="content-form" novalidate>
          <div class="space-y-6">
            <!-- Campo: Contenido del Blog (Textarea) -->
            <div>
              <label
                for="contenido_blog"
                class="block text-sm font-medium text-gray-700 mb-1"
              >
                Contenido del Blog (Formato JSON)
              </label>
              <textarea
                id="contenido_blog"
                name="contenido_blog"
                rows="8"
                required
                placeholder='{"titulo": "Mi Nuevo Artículo", "cuerpo": "Este es el contenido del blog...", "autor": "Nombre Apellido", "tags": ["tecnologia", "novedades"]}'
                class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary-red focus:border-primary-red transition duration-150 ease-in-out resize-none"
              ></textarea>
            </div>

            <!-- Campo: Imagen del Blog (File Input) -->
            <div>
              <label
                for="imagen_blog"
                class="block text-sm font-medium text-gray-700 mb-1"
              >
                Imagen del Blog
              </label>
              <input
                type="file"
                id="imagen_blog"
                name="imagen_blog"
                required
                accept=".png, .jpg, .jpeg, .webp"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary-red/10 file:text-primary-red hover:file:bg-primary-red/20 transition"
              />
            </div>

            <!-- Botón de Envío -->
            <div>
              <button
                type="submit"
                id="submit-btn"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-medium text-white bg-primary-red hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-red transition duration-150 ease-in-out disabled:bg-gray-400 disabled:cursor-not-allowed"
              >
                Enviar Contenido
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script>
      // --- SELECCIÓN DE ELEMENTOS DEL DOM ---
      const contentForm = document.getElementById("content-form");
      const submitButton = document.getElementById("submit-btn");
      const notification = document.getElementById("notification");
      const webhookUrl =
        "https://jarvismaker.foxshortcut.com/webhook/mariemily_blog";

      // --- FUNCIÓN PARA MOSTRAR NOTIFICACIONES ---
      function showNotification(message, isError = false) {
        notification.textContent = message;
        notification.classList.remove("hidden", "bg-green-500", "bg-red-500");
        notification.classList.add(isError ? "bg-red-500" : "bg-green-500");
        setTimeout(() => {
          notification.classList.add("hidden");
        }, 5000);
      }

      // --- GESTOR DEL EVENTO DE ENVÍO DEL FORMULARIO ---
      contentForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        // --- VALIDACIÓN DEL LADO DEL CLIENTE ---
        const blogContentField = document.getElementById("contenido_blog");
        const imageField = document.getElementById("imagen_blog");

        // 1. Validar que el contenido del blog no esté vacío y sea un JSON válido.
        const contentValue = blogContentField.value.trim();
        if (contentValue === "") {
          showNotification(
            'El campo "Contenido del Blog" no puede estar vacío.',
            true
          );
          return;
        }
        try {
          JSON.parse(contentValue);
        } catch (e) {
          showNotification(
            'El formato del JSON en "Contenido del Blog" es inválido.',
            true
          );
          return; // Detiene el envío
        }

        // 2. Validar que se haya seleccionado un archivo.
        if (imageField.files.length === 0) {
          showNotification(
            "Por favor, selecciona una imagen para el blog.",
            true
          );
          return; // Detiene el envío
        }

        // --- CAMBIO DE ESTADO A "CARGANDO" ---
        submitButton.disabled = true;
        submitButton.textContent = "Enviando...";

        const formData = new FormData(contentForm);

        try {
          // --- PETICIÓN FETCH ASÍNCRONA ---
          const response = await fetch(webhookUrl, {
            method: "POST",
            body: formData,
          });

          // Verifica si la respuesta del servidor es exitosa (códigos 200-299).
          if (response.ok) {
            showNotification("¡Contenido enviado correctamente!", false);
            contentForm.reset();
          } else {
            // Si hay un error, se obtiene más detalle del cuerpo de la respuesta.
            const errorBody = await response.text();
            console.error("Detalles del error del servidor:", {
              status: response.status,
              statusText: response.statusText,
              body: errorBody,
            });
            throw new Error(
              `Error ${response.status}: ${response.statusText}. Revisa la consola para más detalles.`
            );
          }
        } catch (error) {
          // --- MANEJO DE ERRORES ---
          console.error("Error en el envío:", error);
          showNotification(
            error.message ||
              "Error al enviar el contenido. Inténtalo de nuevo.",
            true
          );
        } finally {
          // --- RESTABLECIMIENTO DEL ESTADO DEL BOTÓN ---
          submitButton.disabled = false;
          submitButton.textContent = "Enviar Contenido";
        }
      });
    </script>
  </body>
</html>
